<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout</title>
</head>
<body>

    <header class="header">
        <div class="container-fluid p-0">

            <div class="header__inner shadow-sm pt-3 pb-3">
                <div class="row">
                    <div class="col-lg-3">
                        <div class="row align-items-center">
                            <div class="col-lg-1">
                                <a href="#" class="header__link-nav">
                                    <img class="header__link-nav-img" src="./src/image/menu-ico.svg" alt="YouTube Menu">
                                </a>
                            </div>
                            <div class="col-lg-11">
                                <a href="#" class="header__link-nav">
                                    <img src="./src/image/logo.svg" alt="YouTube">
                                </a>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-9">
                        <div class="row align-items-center">
                            <div class="col-lg-8">
                                <input type="text" placeholder="Search..." class="header__search-input">
                            </div>
                            <div class="col-lg-2">
                                <a href="#" class="header__link-upload">
                                    <img class="header__link-upload-img" src="./src/image/upload-ico.svg" alt="Upload video">
                                </a>
                            </div>
                            <div class="col-lg-1">
                                <a href="#" class="header__link-notification">
                                    <img class="header__link-notification-img" src="./src/image/notification-ico.svg" alt="Your notifications">
                                </a>
                            </div>
                            <div class="col-lg-1">
                                <a href="#" class="header__link-account">
                                    <img src="./src/image/avatar.png" alt="Your account">
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </header>

    <div class="container-fluid p-0">

        <div class="row">
            <div class="col-lg-2 p-0">
                <nav class="nav">

                    <ul class="nav__list">
                        <li class="nav__list-title">
                            Main
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__home-link">Home</a>
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__channels-link">My channels</a>
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__trending-link">Trending</a>
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__subscriptions-link">Subscriptions</a>
                        </li>
                    </ul>
                    <ul class="nav__list">
                        <li class="nav__list-title">
                            Library
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__history-link">History</a>
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__later-link">Watch Later</a>
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__likes-link">Liked Videos</a>
                        </li>
                    </ul>
                    <ul class="nav__list">
                        <li class="nav__list-title">
                            Subscriptions
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__video-link">Video</a>
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__video-link">Video</a>
                        </li>
                        <li class="nav__list-item">
                            <a href="#" class="nav__link nav__video-link">Video</a>
                        </li>
                    </ul>

                </nav>
            </div>
            <div class="col-lg-10 p-0">
                <main class="main">

                    <section class="banner">
                        <div class="container align-content-between pl-3 pr-3">

                            <div class="row">
                                <div class="col-12">
                                    <div class="banner__img-container">
                                        <img src="./src/image/avatar.jpg" class="banner__img" alt="Avatar">
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center">
                                <h1 class="banner__channel-name pr-3 mb-0">
                                    BoyceavenueVEVO
                                </h1>
                                <div class="banner__btn-subscribe-container flex-grow-1  pr-3">
                                    <button class="banner__btn-subscribe">
                                        Subscribe
                                    </button>
                                </div>
                                <div class="banner__social-container d-flex justify-content-between">
                                    <a href="#" class="banner__twitter-link pr-3">
                                        <img class="banner__twitter-img" src="./src/image/twitter-ico.svg" alt="Twitter">
                                    </a>
                                    <a href="#" class="banner__facebook-link pr-3">
                                        <img class="banner__facebook-img" src="./src/image/facebook-ico.svg" alt="Facebook">
                                    </a>
                                    <a href="#" class="banner__google-plus-link">
                                        <img class="banner__google-plus-img" src="./src/image/google-plus-ico.svg" alt="Google Plus">
                                    </a>
                                </div>
                            </div>

                        </div>
                    </section>

                    <section class="channel-info shadow">
                        <div class="container p-3">
                            <ul class="channel-info__menu d-flex flex-row justify-content-start p-0">
                                <li class="channel-info__menu-item active p-0 mr-4">Home</li>
                                <li class="channel-info__menu-item p-0 mr-4">Videos</li>
                                <li class="channel-info__menu-item p-0 mr-4">Playlist</li>
                                <li class="channel-info__menu-item p-0 mr-4">Channels</li>
                                <li class="channel-info__menu-item p-0">About</li>
                            </ul>


                        </div>
                    </section>

                </main>
            </div>
        </div>


    </div>



    <script src="./dist/bundle.js"></script>
</body>
</html>
